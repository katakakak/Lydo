<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lydo Pro - Gestion Complète</title>
    <link rel="stylesheet" href="lydoUI.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
</head>
<body>
    <audio id="audio-player"></audio>
    
    <div class="app-layout">
        <aside class="side-panel left-panel">
            <div class="album-art-wrapper">
                <img src="https://picsum.photos/400/400?grayscale" id="main-cover">
            </div>
            <div class="track-info">
                <h2 id="track-title">Lydo Music</h2>
                <p id="track-artist">Ma bibliothèque</p>
            </div>
            
            <div class="selection-box" id="selection-bar">
                <p id="select-count">0 sélectionné(s)</p>
                <button class="btn-action" onclick="openModal()">Ajouter aux playlists</button>
                <button class="btn-danger" onclick="deleteSelected()">Supprimer définitivement</button>
            </div>
        </aside>

        <main class="feed">
            <header class="top-bar">
                <label class="btn-import">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Importer
                    <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none">
                </label>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Rechercher un titre...">
                </div>
            </header>
            <h1 id="view-title">Tous les titres</h1>
            <div id="music-list"></div>
        </main>

        <aside class="side-panel right-panel">
            <div class="label">NAVIGATION</div>
            <div class="nav-item active" id="nav-all" onclick="loadAllSongs()">
                <i class="fa-solid fa-house"></i> Bibliothèque
            </div>
            <hr>
            <div class="label">MES PLAYLISTS</div>
            <div id="playlist-container"></div>
            <button class="btn-new-pl" onclick="createNewPlaylist()">+ Nouvelle Playlist</button>
        </aside>
    </div>

    <footer class="player">
        <div class="progress-area">
            <input type="range" id="progress-bar" min="0" max="100" value="0">
        </div>
        <div class="player-inner">
            <div class="p-left"></div>
            <div class="p-center">
                <button id="btn-prev"><i class="fa-solid fa-backward-step"></i></button>
                <button class="play-trigger" id="btn-play-pause"><i class="fa-solid fa-circle-play" id="play-icon"></i></button>
                <button id="btn-next"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <div class="p-right">
                <i class="fa-solid fa-volume-high"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5">
            </div>
        </div>
    </footer>

    <div id="playlist-modal" class="modal">
        <div class="modal-content">
            <h3>Envoyer vers...</h3>
            <div id="modal-list"></div>
            <button onclick="closeModal()" class="btn-close">Annuler</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
